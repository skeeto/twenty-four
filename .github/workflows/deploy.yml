name: Deploy PWA

# Build the Emscripten PWA and publish it to the gh-pages branch.
# No native artifacts are produced — the web app is the deliverable.

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow pushing to the gh-pages branch with the built-in token.
permissions:
  contents: write

# One deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build PWA
        run: |
          set -eux
          # Install the Emscripten SDK (latest; pin a tag here for reproducibility).
          git clone --depth 1 https://github.com/emscripten-core/emsdk.git
          ./emsdk/emsdk install latest
          ./emsdk/emsdk activate latest
          source ./emsdk/emsdk_env.sh
          # Configure, build, and stage just the PWA files into dist/.
          emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=MinSizeRel
          cmake --build build-web -j"$(nproc)"
          cmake --install build-web --prefix dist

      - name: Publish to gh-pages
        if: github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # Preserve a custom-domain CNAME if the live gh-pages branch has one.
          git fetch -q "$REMOTE" gh-pages || true
          if git show FETCH_HEAD:CNAME > dist/CNAME 2>/dev/null; then
            echo "preserved existing CNAME"
          else
            rm -f dist/CNAME
          fi
          touch dist/.nojekyll  # serve files as-is; skip Jekyll processing
          cd dist
          git init -q
          git checkout -qb gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Deploy ${GITHUB_SHA}"
          git push -fq "$REMOTE" gh-pages
