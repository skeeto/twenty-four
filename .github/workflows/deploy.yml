name: Deploy PWA

# Build the Emscripten PWA and publish it to the gh-pages branch.
# No native artifacts are produced — the web app is the deliverable.

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow pushing to the gh-pages branch with the built-in token.
permissions:
  contents: write

# One deploy at a time; newer pushes supersede in-flight ones.
concurrency:
  group: deploy-pages
  cancel-in-progress: true

env:
  # Pinned so the toolchain (and its caches) are reproducible. Bump to upgrade.
  EM_VERSION: 5.0.7
  CCACHE_COMPILERCHECK: content  # key on emcc contents, not mtime

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The Emscripten SDK install includes its system-library/port cache, so a
      # hit skips both the toolchain download and the first-build sysroot work.
      - name: Cache emsdk
        uses: actions/cache@v4
        with:
          path: emsdk
          key: emsdk-${{ env.EM_VERSION }}

      # Installs ccache and manages its cache. Compiled objects are keyed by
      # content, so SDL3 (unchanged between commits) is restored from cache
      # instead of recompiled; only changed sources actually build.
      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache-${{ env.EM_VERSION }}
          max-size: 500M

      - name: Set up Emscripten
        run: |
          set -eux
          if [ ! -x emsdk/emsdk ]; then
            git clone --depth 1 https://github.com/emscripten-core/emsdk.git
          fi
          ./emsdk/emsdk install "${EM_VERSION}"
          ./emsdk/emsdk activate "${EM_VERSION}"

      - name: Build PWA
        run: |
          set -eux
          source ./emsdk/emsdk_env.sh
          ccache --zero-stats
          # ccache fronts both compilers (SDL3 is C, our code is C++).
          emcmake cmake -B build-web -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          cmake --build build-web -j"$(nproc)"
          cmake --install build-web --prefix dist
          ccache --show-stats   # surfaces the hit rate in the log

      - name: Publish to gh-pages
        if: github.ref == 'refs/heads/master'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          # Preserve a custom-domain CNAME if the live gh-pages branch has one.
          git fetch -q "$REMOTE" gh-pages || true
          if git show FETCH_HEAD:CNAME > dist/CNAME 2>/dev/null; then
            echo "preserved existing CNAME"
          else
            rm -f dist/CNAME
          fi
          touch dist/.nojekyll  # serve files as-is; skip Jekyll processing
          cd dist
          git init -q
          git checkout -qb gh-pages
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -qm "Deploy ${GITHUB_SHA}"
          git push -fq "$REMOTE" gh-pages
